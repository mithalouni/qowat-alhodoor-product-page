<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" dir="rtl">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d5c1"/>
      <stop offset="0.45" stop-color="#edece8"/>
      <stop offset="1" stop-color="#d9d6cf"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="0.58" stop-color="#24211e"/>
      <stop offset="1" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#090909"/>
      <stop offset="1" stop-color="#3b2113"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="38" stdDeviation="38" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .font{font-family:'IBM Plex Sans Arabic','Arial',sans-serif}.title{font-weight:800;font-size:95px;fill:#fff}.sub{font-weight:700;font-size:34px;fill:#f4c9b2}.small{font-weight:700;font-size:25px;fill:#fff}.tag{font-weight:700;font-size:23px;fill:#d35400}
    </style>
  </defs>
  <rect width="1200" height="1200" rx="0" fill="url(#bg)"/>
  <circle cx="620" cy="500" r="380" fill="#d35400" opacity="0.12" filter="url(#glow)"/>
  <ellipse cx="600" cy="1032" rx="330" ry="72" fill="#000" opacity="0.18"/>
  <g filter="url(#shadow)" transform="translate(95 70) rotate(-4 505 520)">
    <path d="M318 158 L768 98 Q815 93 848 126 L923 205 Q951 235 951 286 L951 916 Q951 955 918 963 L451 1036 Q414 1042 386 1017 L292 933 Q273 915 273 882 L273 217 Q273 164 318 158Z" fill="#111" opacity="0.98"/>
    <path d="M272 218 Q272 166 318 158 L768 98 Q820 92 850 130 L850 859 Q850 904 807 913 L388 997 Q338 1007 306 970 L290 951 Q273 931 273 886 Z" fill="url(#cover)"/>
    <path d="M850 130 L929 210 Q951 232 951 284 L951 913 Q951 955 916 963 L806 987 Q849 949 850 885 Z" fill="url(#spine)"/>
    <path d="M331 210 L760 154 Q790 150 810 172 L810 854 Q810 877 788 882 L391 958 Q363 963 344 943 Z" fill="none" stroke="#f4c9b2" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="560" cy="445" r="175" fill="#d35400" opacity="0.15"/>
    <path d="M445 510 C480 424 529 366 596 338 C620 328 647 328 668 343 C636 371 616 411 606 465 C658 440 711 439 761 469 C714 498 673 537 641 588 C598 557 530 536 445 510Z" fill="#f4c9b2" opacity="0.92"/>
    <text class="font title" x="735" y="285" text-anchor="middle">كاريزما</text>
    <text class="font title" x="735" y="390" text-anchor="middle" fill="#d35400">جذابة</text>
    <rect x="488" y="615" width="390" height="5" rx="3" fill="#d35400"/>
    <text class="font sub" x="685" y="690" text-anchor="middle">أسرار علم النفس</text>
    <text class="font sub" x="685" y="738" text-anchor="middle">للجاذبية والاحترام</text>
    <text class="font sub" x="685" y="786" text-anchor="middle">والقوة الاجتماعية</text>
    <rect x="565" y="846" width="250" height="58" rx="29" fill="#fff" opacity="0.94"/>
    <text class="font tag" x="690" y="884" text-anchor="middle">كتاب نفسي عملي</text>
    <text class="font small" transform="translate(905 570) rotate(90)" text-anchor="middle">كاريزما جذابة</text>
  </g>
</svg>
